<!doctype html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ISTE DEMYO Dalış Kayıt Sistemi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="index">
    <header class="topbar">
        <div class="brand">
            <img class="brand-mark" src="assets/iste-amblem.png" alt="İskenderun Teknik Üniversitesi amblemi">
            <div>
                <strong>İskenderun Teknik Üniversitesi</strong>
                <span>Denizcilik Teknolojileri MYO</span>
                <small>Dalış Kayıt Sistemi</small>
            </div>
        </div>
    </header>

    <main class="shell">
        <section class="intro-band">
            <div>
                <h1>Dalış Kayıt</h1>
            </div>
        </section>

        <section class="role-grid">
            <article class="panel role-panel">
                <div class="panel-icon">Ö</div>
                <h2>Öğrenci Girişi</h2>
                <a class="btn primary full" href="student-login.html">Öğrenci Girişi</a>
            </article>

            <article class="panel role-panel">
                <div class="panel-icon dark">S</div>
                <h2>Öğretim Elemanı / Dalış Amiri</h2>
                <a class="btn secondary full" href="staff-login.html">Staff Girişi</a>
            </article>

            <article class="panel role-panel">
                <div class="panel-icon dark">Y</div>
                <h2>Yönetici Girişi</h2>
                <a class="btn secondary full" href="admin-login.html">Yönetici Girişi</a>
            </article>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
