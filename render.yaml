services:
  - type: web
    name: istedalis
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm install && npm run check:files
    startCommand: npm start
    healthCheckPath: /up
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
    disk:
      name: istedalis-data
      mountPath: /var/data
      sizeGB: 1
