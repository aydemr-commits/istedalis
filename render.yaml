services:
  - type: web
    name: istedalis
    runtime: docker
    region: frankfurt
    plan: starter
    healthCheckPath: /up
    preDeployCommand: php artisan migrate --force && php artisan admin:ensure --force
    autoDeployTrigger: commit
    disk:
      name: istedalis-storage
      mountPath: /var/www/html/storage
      sizeGB: 1
    envVars:
      - key: APP_NAME
        value: istedalis
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: istedalis-db
          property: connectionString
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_ENCRYPT
        value: "true"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_SAME_SITE
        value: strict
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: BACKUP_RETENTION_DAYS
        value: "14"
      - key: AUTO_BACKUP_TOKEN
        generateValue: true
      - key: ADMIN_STAFF_NO
        value: "3001"
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Sistem
      - key: ADMIN_SURNAME
        value: Yoneticisi

  - type: cron
    name: istedalis-auto-backup
    runtime: docker
    region: frankfurt
    plan: starter
    schedule: "0 0 * * *"
    dockerCommand: ./docker/run-backup-cron.sh
    envVars:
      - key: APP_URL
        fromService:
          name: istedalis
          type: web
          envVarKey: APP_URL
      - key: AUTO_BACKUP_TOKEN
        fromService:
          name: istedalis
          type: web
          envVarKey: AUTO_BACKUP_TOKEN

databases:
  - name: istedalis-db
    region: frankfurt
    plan: basic-256mb
    databaseName: istedalis
    user: istedalis_user
    ipAllowList: []
